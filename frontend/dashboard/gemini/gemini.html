<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Ultra UI</title>
<link rel="stylesheet" href="gemini.css">
<!-- 🔒 AUTH GUARD -->
<script src="../../signup/auth-guard.js"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="header-left">
    <button class="menu-btn">☰</button>
    <h2 class="logo">Gemini</h2>
  </div>

  <div class="header-center">
    <span class="title">AI Assistant</span>
  </div>

  <div class="header-right">
    <button class="icon-btn">🗑️</button>
    <div class="profile">U</div>
  </div>
</header>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

  <div class="sidebar-top">    <div class="sidebar-header">
      <h3>Chats</h3>
      <button class="sidebar-close-btn" title="Close sidebar">✕</button>
    </div>    <div class="new-chat-wrapper">
      <button class="new-chat">+ New Chat</button>
      <button class="clear-all-btn" title="Clear all chats">×</button>
    </div>
  </div>

  <div class="chat-history" id="chatHistory">
  </div>

  <div class="sidebar-bottom">
    <button class="sidebar-settings-btn" title="Settings">⚙️ Settings</button>
  </div>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <!-- HERO -->
  <section class="hero">
    <h1>Hi User, <span>Create</span></h1>
    <p>Welcome! Ask anything to Gemini.</p>
  </section>

  <!-- CHAT AREA -->
  <section class="chat-container" id="chat">

    <div class="message bot">
      <div class="msg-content">
        Hello 👋 I am Gemini AI. How can I help you?
      </div>
    </div>

  </section>

</main>

<!-- ================= INPUT ================= -->
<div class="chat-input">

  <button class="attach">+</button>
  <input type="file" id="imageInput" accept="image/*" style="display: none;">

  <input type="text" id="input" placeholder="Ask Gemini...">

  <button class="mic">🎤</button>

  <button class="send-btn" onclick="sendMessage()">➤</button>

</div>

<script src="gemini.js"></script>
</body>
</html>
